# Desktop release: on a v* tag, build, sign, and publish the Kiln app plus the
# updater manifest (latest.json) to a GitHub Release. Installed apps poll that
# manifest via tauri-plugin-updater (endpoint in apps/desktop/src-tauri/tauri.conf.json).
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — contents of ~/.tauri/kiln-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — its password ("" if none)
name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          # Intel runner, not a cross-target from ARM: the sidecar is a Node
          # SEA built from the host's node binary, so host arch must match.
          # (macos-15-intel is GitHub's last x86_64 image, offered to Aug 2027;
          # after that, drop this target or build the sidecar another way.)
          - platform: macos-15-intel
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r build

      # The Tauri bundle ships the sidecar as an externalBin; it must exist
      # before `tauri build` runs.
      - name: Build sidecar binary
        run: pnpm -C apps/desktop build:binary

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Kiln ${{ github.ref_name }}"
          releaseDraft: false
          args: ${{ matrix.args }}
